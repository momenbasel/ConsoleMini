name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Unsigned build (branch / PR)
        if: startsWith(github.ref, 'refs/tags/v') == false
        run: npx electron-builder --mac --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload unsigned artifact
        if: startsWith(github.ref, 'refs/tags/v') == false
        uses: actions/upload-artifact@v4
        with:
          name: ConsoleMini-mac-arm64-unsigned
          path: release/*.dmg
          if-no-files-found: ignore

      - name: Write App Store Connect API key
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          echo "APPLE_API_KEY=$HOME/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Signed + notarized release build
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --mac --arm64 --x64 --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify notarization
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          for app in release/mac-arm64/ConsoleMini.app release/mac/ConsoleMini.app; do
            [ -d "$app" ] || continue
            echo "=== spctl: $app ==="
            spctl -a -vvv -t install "$app"
            echo "=== stapler: $app ==="
            xcrun stapler validate "$app"
          done

      - name: Compute SHA256 digests
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd release
          shasum -a 256 *.zip *.dmg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
